name: Tests

on:
  push:
  pull_request:
  schedule:
    - cron: '0 0 * * 1'

jobs:
  test:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        php: [ 8.2, 8.3, 8.4, 8.5 ]
        laravel: [ 10, 11, 12, 13 ]
        stability: [ prefer-lowest, prefer-stable ]
        include:
          - laravel: 10
            php: 8.1
            stability: prefer-lowest
          - laravel: 10
            php: 8.1
            stability: prefer-stable
        exclude:
          - laravel: 10
          - php: 8.2

    name: PHP ${{ matrix.php }} - Laravel ${{ matrix.laravel }} (${{ matrix.stability }})

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: dom, curl, json, libxml, mbstring, zip
          tools: composer:v2
          coverage: none

      # https://github.com/briannesbitt/Carbon/releases/tag/2.62.1
      - name: Patch Carbon version
        if: matrix.php == 8.2 && matrix.laravel != 12
        run: |
          composer require "nesbot/carbon=^2.63" --dev --no-interaction --no-update

      - name: Use lower PHPUnit version
        if: matrix.laravel == 10
        run: |
          composer require "phpunit/phpunit=^10.5" --dev --no-interaction --no-update

      - name: Install dependencies
        run: |
          composer require "illuminate/support=^${{ matrix.laravel }}" --no-interaction --no-update
          composer update --${{ matrix.stability }} --prefer-dist --no-interaction --no-progress

      - name: Execute tests
        run: vendor/bin/phpunit
